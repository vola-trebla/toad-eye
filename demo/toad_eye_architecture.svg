<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="toadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
    <linearGradient id="stackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0d1117"/>

  <!-- App box -->
  <rect x="340" y="20" width="220" height="44" rx="8" fill="#4a5568" filter="url(#shadow)"/>
  <text x="450" y="47" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Your LLM service</text>

  <!-- Arrow from App to toad-eye -->
  <line x1="450" y1="64" x2="450" y2="90" stroke="#718096" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#718096"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52b788"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#26c6da"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff8c00"/>
    </marker>
  </defs>

  <!-- toad-eye subgraph -->
  <rect x="30" y="90" width="840" height="200" rx="10" fill="url(#toadGrad)" opacity="0.9" filter="url(#shadow)"/>
  <text x="50" y="115" fill="#95d5b2" font-size="13" font-weight="700" letter-spacing="0.5">toad-eye</text>

  <!-- Row 1: Core tracing -->
  <rect x="60" y="130" width="170" height="56" rx="6" fill="#40916c" opacity="0.9"/>
  <text x="145" y="153" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Auto-instrumentation</text>
  <text x="145" y="173" text-anchor="middle" fill="#d8f3dc" font-size="10">OpenAI · Anthropic · Gemini</text>

  <rect x="250" y="130" width="170" height="56" rx="6" fill="#40916c" opacity="0.9"/>
  <text x="335" y="153" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Manual tracing</text>
  <text x="335" y="173" text-anchor="middle" fill="#d8f3dc" font-size="10">traceLLMCall()</text>

  <rect x="440" y="130" width="170" height="56" rx="6" fill="#40916c" opacity="0.9"/>
  <text x="525" y="153" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Agent tracing</text>
  <text x="525" y="173" text-anchor="middle" fill="#d8f3dc" font-size="10">traceAgentQuery()</text>

  <!-- Row 2: Analysis modules -->
  <rect x="60" y="210" width="170" height="56" rx="6" fill="#40916c" opacity="0.9"/>
  <text x="145" y="233" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Shadow guardrails</text>
  <text x="145" y="253" text-anchor="middle" fill="#d8f3dc" font-size="10">recordGuardResult()</text>

  <rect x="250" y="210" width="170" height="56" rx="6" fill="#40916c" opacity="0.9"/>
  <text x="335" y="233" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Drift monitor</text>
  <text x="335" y="253" text-anchor="middle" fill="#d8f3dc" font-size="10">embedding comparison</text>

  <rect x="440" y="210" width="170" height="56" rx="6" fill="#40916c" opacity="0.9"/>
  <text x="525" y="233" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Trace export</text>
  <text x="525" y="253" text-anchor="middle" fill="#d8f3dc" font-size="10">Jaeger → toad-eval YAML</text>

  <!-- Cost + Privacy + Alerts on the right -->
  <rect x="640" y="130" width="210" height="136" rx="6" fill="#2d6a4f" opacity="0.7"/>
  <text x="745" y="158" text-anchor="middle" fill="#b7e4c7" font-size="11">Cost tracking · Privacy</text>
  <text x="745" y="178" text-anchor="middle" fill="#b7e4c7" font-size="11">Session correlation</text>
  <text x="745" y="198" text-anchor="middle" fill="#b7e4c7" font-size="11">Alerting engine</text>
  <text x="745" y="228" text-anchor="middle" fill="#95d5b2" font-size="10">Telegram · Slack · Webhook · Email</text>
  <text x="745" y="248" text-anchor="middle" fill="#95d5b2" font-size="10">Redaction · Hashing · Sessions</text>

  <!-- Arrow from toad-eye to stack -->
  <line x1="335" y1="290" x2="335" y2="320" stroke="#52b788" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="345" y="310" fill="#52b788" font-size="10">OTLP</text>

  <!-- Observability stack subgraph -->
  <rect x="30" y="330" width="840" height="170" rx="10" fill="url(#stackGrad)" opacity="0.9" filter="url(#shadow)"/>
  <text x="50" y="355" fill="#94a3b8" font-size="13" font-weight="700" letter-spacing="0.5">Observability stack (Docker)</text>

  <!-- OTel Collector -->
  <rect x="260" y="370" width="160" height="50" rx="6" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="340" y="393" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">OTel Collector</text>
  <text x="340" y="409" text-anchor="middle" fill="#93c5fd" font-size="10">:4318</text>

  <!-- Arrow Collector → Prometheus -->
  <line x1="340" y1="420" x2="200" y2="450" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="255" y="440" fill="#3b82f6" font-size="10">metrics</text>

  <!-- Arrow Collector → Jaeger -->
  <line x1="340" y1="420" x2="500" y2="450" stroke="#26c6da" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="410" y="440" fill="#26c6da" font-size="10">traces</text>

  <!-- Prometheus -->
  <rect x="100" y="450" width="160" height="40" rx="6" fill="#e24d1e" filter="url(#shadow)"/>
  <text x="180" y="475" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Prometheus :9090</text>

  <!-- Jaeger -->
  <rect x="440" y="450" width="160" height="40" rx="6" fill="#00838f" filter="url(#shadow)"/>
  <text x="520" y="475" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Jaeger :16686</text>

  <!-- Grafana -->
  <rect x="680" y="370" width="170" height="50" rx="6" fill="#f46800" filter="url(#shadow)"/>
  <text x="765" y="393" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Grafana :3100</text>
  <text x="765" y="409" text-anchor="middle" fill="#ffd6a5" font-size="10">5 dashboards</text>

  <!-- Arrow Prometheus → Grafana -->
  <line x1="260" y1="470" x2="680" y2="400" stroke="#ff8c00" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Dotted arrow Jaeger → Export -->
  <line x1="520" y1="450" x2="525" y2="270" stroke="#26c6da" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowCyan)"/>
</svg>
